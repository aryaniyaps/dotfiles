# tmux sensible defaults

# Enable mouse support (pane selection, resizing, window switching, scrolling)
set -g mouse on

# Improve terminal color/feature support
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"

# Keep a larger scrollback history
set -g history-limit 100000

# Start window/pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Faster escape handling for Vim/Neovim in tmux
set -sg escape-time 10

# Split panes using | and - in current directory
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Reload config quickly
bind r source-file ~/.tmux.conf \; display-message "tmux config reloaded"
