name: Validate chezmoi apply (Ubuntu/Debian/Fedora/Arch)

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  chezmoi-apply:
    name: ${{ matrix.distro }}
    runs-on: ubuntu-latest
    container:
      image: ${{ matrix.image }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: ubuntu
            image: ubuntu:24.04
            bootstrap: apt-get update && apt-get install -y ca-certificates curl git zsh sudo
          - distro: debian
            image: debian:12
            bootstrap: apt-get update && apt-get install -y ca-certificates curl git zsh sudo
          - distro: fedora
            image: fedora:41
            bootstrap: dnf install -y ca-certificates curl git zsh sudo
          - distro: arch
            image: archlinux:latest
            bootstrap: pacman -Sy --noconfirm ca-certificates curl git zsh sudo

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install distro prerequisites
        run: ${{ matrix.bootstrap }}

      - name: Install chezmoi
        run: sh -c "$(curl -fsLS get.chezmoi.io)" -- -b /usr/local/bin

      - name: Run chezmoi apply
        env:
          HOME: /tmp/chezmoi-home
        run: |
          mkdir -p "$HOME"
          chezmoi init --apply --source "$GITHUB_WORKSPACE" \
            --promptString 'Git author name=CI Bot' \
            --promptString 'Git author email=ci@example.com' \
            --no-tty
